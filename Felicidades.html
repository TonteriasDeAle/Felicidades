<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Felicidades Licenciada! 🎓💐</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    /* Fondo elegante y festivo */
    background: radial-gradient(circle at center, #ffffff, #ffe6b3, #ffcc66);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* PANTALLA DE INICIO (Forma de carta/sobre) */
  #overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(255, 255, 255, 0.9);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 2000;
    transition: opacity 1s ease, transform 1s ease;
  }

  .sobre {
    width: 300px;
    height: 200px;
    background-color: #d9a05b;
    position: relative;
    cursor: pointer;
    box-shadow: 0 15px 30px rgba(0,0,0,0.3);
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 5px;
    animation: latido 2s infinite;
  }

  /* La solapa de la carta */
  .sobre::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    border-left: 150px solid transparent;
    border-right: 150px solid transparent;
    border-top: 100px solid #c88c47;
    z-index: 2;
  }

  .sello {
    position: absolute;
    background: #cc0000;
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 18px;
    z-index: 10;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }

  @keyframes latido {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  /* CONTENIDO PRINCIPAL */
  .container {
    width: 100%;
    height: 100vh;
    position: relative;
    text-align: center;
    cursor: pointer; /* Indica que se puede tocar */
  }

  .titulo {
    position: absolute;
    top: 8%;
    width: 100%;
    font-size: 45px;
    color: #b37700;
    font-weight: bold;
    text-shadow: 3px 3px 0px white, 0 0 15px rgba(255,200,0,0.8);
    z-index: 20;
    pointer-events: none;
  }

  /* RAMO Y BIRRETE COMPUESTOS */
  .centro-regalo {
    position: absolute;
    bottom: 10%;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    justify-content: center;
    align-items: flex-end;
    z-index: 10;
    pointer-events: none;
    animation: flotar-suave 4s ease-in-out infinite;
  }

  .ramo { font-size: 220px; filter: drop-shadow(0 20px 20px rgba(0,0,0,0.2)); }
  .birrete { 
    position: absolute; 
    font-size: 120px; 
    top: -40px; 
    right: 20px; 
    transform: rotate(15deg);
    filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3));
  }

  @keyframes flotar-suave {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-20px); }
  }

  /* EFECTOS AL TOCAR (Mensajes y Serpentina) */
  .mensaje-popup {
    position: absolute;
    font-size: 32px;
    font-weight: bold;
    text-align: center;
    animation: flotar-arriba 2s ease forwards;
    pointer-events: none;
    text-shadow: 2px 2px 0px white;
    z-index: 100;
  }

  @keyframes flotar-arriba {
    0% { opacity: 0; transform: scale(0.5) translateY(0); }
    20% { opacity: 1; transform: scale(1.2) translateY(-20px); }
    100% { opacity: 0; transform: scale(1) translateY(-150px); }
  }

  .serpentina {
    position: absolute;
    width: 10px;
    height: 30px;
    pointer-events: none;
    z-index: 90;
    animation: explosion-serpentina 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
  }

  @keyframes explosion-serpentina {
    0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) rotate(var(--rot)) scale(0.5); opacity: 0; }
  }

  /* MARIPOSAS DE FONDO */
  .mariposa { position: absolute; font-size: 35px; animation: volar 12s linear infinite; pointer-events: none; z-index: 5;}
  @keyframes volar {
    0% { transform: translate(-10vw, 80vh) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    100% { transform: translate(110vw, -10vh) rotate(360deg); opacity: 0; }
  }
</style>
</head>
<body>

<div id="overlay">
  <div class="sobre" id="btn-comenzar">
    <div class="sello">Abrir Regalo 💌</div>
  </div>
  <h2 style="color: #b37700; margin-top: 30px;">Tienes una sorpresa</h2>
</div>

<div class="container" id="area-toque">
  <div class="titulo">¡Felicidades Licenciada!</div>
  
  <div class="centro-regalo">
    <div class="ramo">💐</div>
    <div class="birrete">🎓</div>
  </div>
</div>

<audio id="musica" loop>
  <source src="cancion.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById('musica');
const btn = document.getElementById('btn-comenzar');
const overlay = document.getElementById('overlay');
const areaToque = document.getElementById('area-toque');

// Iniciar al tocar la carta
btn.addEventListener('click', () => {
  audio.play().catch(e => console.log("Permiso de audio pendiente"));
  overlay.style.transform = 'translateY(-100vh)'; // Animación de la carta yéndose hacia arriba
  overlay.style.opacity = '0';
  setTimeout(() => overlay.style.display = 'none', 1000);
});

// Palabras para los pop-ups
const palabras = ["¡Felicidades!", "¡Licenciada!", "¡Lo lograste!", "🎓✨", "Orgullo total 💛"];
const coloresTexto = ["#e60000", "#0066cc", "#009933", "#ff6600", "#9900cc"];

areaToque.addEventListener('click', (e) => {
  // 1. Crear el mensaje de texto Pop-Up
  let msg = document.createElement("div");
  msg.className = "mensaje-popup";
  msg.innerText = palabras[Math.floor(Math.random() * palabras.length)];
  msg.style.color = coloresTexto[Math.floor(Math.random() * coloresTexto.length)];
  
  // Centrar el texto en el toque
  msg.style.left = (e.clientX - 80) + "px";
  msg.style.top = (e.clientY - 30) + "px";
  document.body.appendChild(msg);
  setTimeout(() => msg.remove(), 2000);

  // 2. Crear explosión de serpentina
  crearSerpentina(e.clientX, e.clientY);
});

function crearSerpentina(x, y) {
  const colores = ['#FF5733', '#33FF57', '#3357FF', '#F3FF33', '#FF33F3', '#33FFF3'];
  
  for(let i = 0; i < 20; i++) {
    let serpi = document.createElement("div");
    serpi.className = "serpentina";
    serpi.style.backgroundColor = colores[Math.floor(Math.random() * colores.length)];
    serpi.style.left = x + "px";
    serpi.style.top = y + "px";
    
    // Calcular una trayectoria aleatoria (explosión en 360 grados)
    let angulo = Math.random() * Math.PI * 2;
    let distancia = Math.random() * 200 + 50; // Qué tan lejos vuela
    let rotacionFinal = Math.random() * 720; // Cuántas vueltas da
    
    serpi.style.setProperty('--dx', (Math.cos(angulo) * distancia) + 'px');
    serpi.style.setProperty('--dy', (Math.sin(angulo) * distancia) + 'px');
    serpi.style.setProperty('--rot', rotacionFinal + 'deg');
    
    document.body.appendChild(serpi);
    setTimeout(() => serpi.remove(), 1000);
  }
}

// Generar Mariposas volando constantemente
setInterval(() => {
  let m = document.createElement("div");
  m.className = "mariposa";
  m.innerHTML = "🦋";
  m.style.top = (Math.random() * 70 + 10) + "vh";
  m.style.animationDuration = (Math.random() * 5 + 8) + "s";
  document.body.appendChild(m);
  setTimeout(() => m.remove(), 12000);
}, 2000);
</script>

</body>
</html>
